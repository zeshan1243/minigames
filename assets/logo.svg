<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#b44dff"/>
      <stop offset="100%" style="stop-color:#ff2d7b"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#ff2d7b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="4" y="8" width="64" height="64" rx="14" fill="url(#iconBg)" stroke="#222" stroke-width="1"/>
  <text x="36" y="52" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="40" fill="url(#zGrad)" filter="url(#glow)">Z</text>
  <circle cx="56" cy="18" r="4.5" fill="#ffd60a"/>
  <!-- Mini game bar -->
  <rect x="12" y="60" width="10" height="4" rx="2" fill="#00e676"/>
  <rect x="25" y="60" width="7" height="4" rx="2" fill="#00d4ff"/>
  <rect x="35" y="60" width="5" height="4" rx="2" fill="#ff2d7b"/>
  <rect x="43" y="60" width="8" height="4" rx="2" fill="#ffd60a"/>

  <!-- Text: ZEHUM -->
  <text x="82" y="42" font-family="'Arial Black',Impact,sans-serif" font-weight="900" font-size="34" letter-spacing="2" fill="url(#textGrad)" filter="url(#glow)">ZEHUM</text>

  <!-- Text: MINI GAMES -->
  <text x="84" y="64" font-family="Arial,Helvetica,sans-serif" font-weight="600" font-size="16" letter-spacing="6" fill="#8888a0">MINI GAMES</text>

  <!-- Decorative dots -->
  <circle cx="248" cy="26" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="260" cy="20" r="2" fill="#ff2d7b" opacity="0.5"/>
  <circle cx="254" cy="34" r="2.5" fill="#ffd60a" opacity="0.4"/>
</svg>
